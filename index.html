<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A股板块涨跌榜</title>
  <style>
    :root {
      --up: #f04a4a;
      --up-bg: rgba(240,74,74,0.12);
      --down: #0ecb81;
      --down-bg: rgba(14,203,129,0.12);
      --flat: #888;
      --bg: #0d1117;
      --card: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #6e7681;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 18px 24px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .03em; }
    header h1 span { color: var(--accent); }
    .meta { display: flex; align-items: center; gap: 16px; font-size: .82rem; color: var(--muted); flex-wrap: wrap; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--flat);
      display: inline-block; margin-right: 4px;
    }
    .status-dot.live { background: var(--up); box-shadow: 0 0 6px var(--up); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .data-badge {
      padding: 3px 10px; border-radius: 12px; font-size: .76rem;
      border: 1px solid var(--border); color: var(--muted);
    }
    .data-badge.cached { border-color: #3fb950; color: #3fb950; }
    .data-badge.live   { border-color: var(--up); color: var(--up); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px; padding: 16px 24px 0;
      border-bottom: 1px solid var(--border); background: var(--card); overflow-x: auto;
    }
    .tab-btn {
      padding: 8px 18px; border: none; background: none; color: var(--muted);
      cursor: pointer; font-size: .9rem; border-bottom: 2px solid transparent;
      transition: all .2s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; gap: 12px; flex-wrap: wrap;
    }
    .sort-btns { display: flex; gap: 6px; }
    .sort-btn {
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: none; color: var(--muted); cursor: pointer; font-size: .8rem; transition: all .2s;
    }
    .sort-btn:hover { color: var(--text); border-color: var(--accent); }
    .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .refresh-btn {
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px;
      background: none; color: var(--muted); cursor: pointer; font-size: .82rem;
      display: flex; align-items: center; gap: 6px; transition: all .2s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }
    .refresh-btn.spinning svg { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Summary ── */
    .summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px; padding: 0 24px 16px;
    }
    .s-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; text-align: center; }
    .s-card .s-label { font-size: .75rem; color: var(--muted); margin-bottom: 4px; }
    .s-card .s-val { font-size: 1.3rem; font-weight: 700; }
    .s-card .s-val.up { color: var(--up); }
    .s-card .s-val.down { color: var(--down); }

    /* ── Normal board ── */
    #board-container {
      padding: 0 24px 24px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 8px;
    }
    .sector-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px; transition: border-color .2s;
    }
    .sector-row:hover { border-color: var(--accent); }
    .s-rank { width: 24px; text-align: center; font-size: .75rem; color: var(--muted); flex-shrink: 0; }
    .s-name { flex: 0 0 110px; font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
    .bar-fill.up   { background: var(--up); }
    .bar-fill.down { background: var(--down); }
    .bar-fill.flat { background: var(--flat); }
    .s-pct { width: 58px; text-align: right; font-size: .9rem; font-weight: 700; flex-shrink: 0; }
    .s-pct.up   { color: var(--up); }
    .s-pct.down { color: var(--down); }
    .s-pct.flat { color: var(--flat); }

    /* ── Heatmap ── */
    #board-container.heatmap { display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
    #board-container.heatmap .sector-row {
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 10px 8px; width: auto; border-radius: 6px;
    }
    #board-container.heatmap .s-rank { display: none; }
    #board-container.heatmap .s-name { flex: unset; font-size: .82rem; text-align: center; width: 80px; }
    #board-container.heatmap .bar-wrap { display: none; }
    #board-container.heatmap .s-pct { width: auto; }

    /* ── Big sector view ── */
    #big-container { padding: 0 24px 32px; display: none; }
    #big-toolbar { display: none; align-items: center; justify-content: space-between; padding: 12px 24px; gap: 12px; flex-wrap: wrap; }

    .big-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 10px; transition: border-color .2s;
    }
    .big-card:hover { border-color: rgba(88,166,255,.4); }
    .big-header {
      display: flex; align-items: center; padding: 14px 18px;
      cursor: pointer; gap: 12px; user-select: none;
    }
    .big-header:hover { background: rgba(255,255,255,.02); }
    .bh-icon { font-size: 1.5rem; flex-shrink: 0; }
    .bh-name { font-size: 1rem; font-weight: 700; flex: 1; }
    .bh-bar-wrap { flex: 0 0 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bh-bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .bh-count { font-size: .75rem; color: var(--muted); width: 48px; text-align: center; flex-shrink: 0; }
    .bh-avg { font-size: 1.15rem; font-weight: 700; width: 72px; text-align: right; flex-shrink: 0; }
    .bh-arrow { color: var(--muted); font-size: .75rem; width: 16px; text-align: center; transition: transform .25s; flex-shrink: 0; }
    .big-card.open .bh-arrow { transform: rotate(90deg); }

    .big-subs {
      display: none; border-top: 1px solid var(--border); padding: 10px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 6px;
    }
    .big-card.open .big-subs { display: grid; }

    .sub-row {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      border-radius: 6px; background: var(--bg); border: 1px solid var(--border); transition: border-color .15s;
    }
    .sub-row:hover { border-color: var(--accent); }
    .sub-name { flex: 1; font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-bar-wrap { flex: 0 0 60px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .sub-bar-fill { height: 100%; border-radius: 3px; }
    .sub-pct { width: 54px; text-align: right; font-size: .82rem; font-weight: 700; flex-shrink: 0; }

    /* ── Loading / Error ── */
    #loading {
      text-align: center; padding: 60px 24px; color: var(--muted); font-size: .9rem;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
    }
    #error-msg {
      display: none; padding: 20px 24px;
      background: rgba(240,74,74,.08); border: 1px solid rgba(240,74,74,.3);
      border-radius: 8px; margin: 0 24px; color: var(--up); font-size: .88rem;
    }

    footer {
      text-align: center; padding: 20px; font-size: .75rem;
      color: var(--muted); border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <h1>📊 A股 <span>板块涨跌榜</span></h1>
  <div class="meta">
    <span><span class="status-dot" id="statusDot"></span><span id="marketStatus">加载中…</span></span>
    <span id="dataBadge" class="data-badge" style="display:none"></span>
    <span>更新: <span id="updateTime">—</span></span>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-view="big">🏷️ 大板块汇总</button>
  <button class="tab-btn" data-fs="industry">行业板块</button>
  <button class="tab-btn" data-fs="concept">概念板块</button>

</div>

<!-- Big toolbar -->
<div id="big-toolbar">
  <div class="sort-btns">
    <button class="sort-btn active" data-bigsort="pct">按涨跌幅</button>
    <button class="sort-btn" data-bigsort="name">按名称</button>
    <button class="sort-btn" id="bigExpandAll">全部展开</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="sort-btn" id="liveToggle" title="切换到实时数据">📡 实时刷新</button>
    <button class="refresh-btn" id="bigRefreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.28"/>
      </svg>刷新
    </button>
  </div>
</div>

<!-- Normal toolbar -->
<div class="toolbar" id="normalToolbar" style="display:none">
  <div class="sort-btns">
    <button class="sort-btn active" data-sort="pct">按涨跌幅</button>
    <button class="sort-btn" data-sort="name">按名称</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="sort-btn" id="viewToggle">🔥 热力图</button>
    <button class="refresh-btn" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.28"/>
      </svg>刷新
    </button>
  </div>
</div>

<div class="summary" id="summary"></div>
<div id="error-msg"></div>
<div id="loading"><div class="spinner"></div><span>正在加载板块数据…</span></div>
<div id="board-container" style="display:none"></div>
<div id="big-container"></div>

<footer>数据来源：东方财富（每日 15:35 自动更新）· 仅供学习演示，不构成投资建议</footer>

<script>
  /* ═══════════════════════════════════════

      '光通信','光模块','PCB','印制电路板','存储','内存','器件','元件','被动元件',
      // 媒体/生态/支付
      '游戏','传媒','数字','安防','华为','苹果','英伟达','富士康','腾讯','荣耀',
      '增强现实','虚拟现实','混合现实','智能穿戴','无线耳机','柔性屏','屏下',
      '跨境支付','移动支付','数字货币','超清','3D',
    ]},
    { name: '大金融', icon: '🏦', keywords: [
      '银行','农商行','城商行','证券','保险','券商','信托','期货',
      '多元金融','非银金融','金融','租赁',

    { name: '汽车', icon: '🚗', keywords: [

      '智能驾驶','自动驾驶','无人驾驶','轮胎',
    ]},
    { name: '出行 / 旅游', icon: '✈️', keywords: [
      '机场','航空','民航','旅游','酒店','免税',
      '交通运输','铁路','公路','港口','物流','快递','航运','景区',
    ]},
    { name: '医药 / 医疗', icon: '💊', keywords: [
      '医药','医疗','生物','CXO','中药','医院','疫苗','基因',
      '血液制品','IVD','体外诊断','医疗器械','医疗服务','眼科','齿科','康复','医美',
    ]},
    { name: '农业', icon: '🌾', keywords: [
      '农林牧渔','农业','种业','化肥','农药','生猪','水产',
      '养殖','禽','饲料','食用菌','蔬菜',
    ]},
    { name: '大消费', icon: '🛒', keywords: [
      '食品饮料','白酒','啤酒','乳品','调味品','食用',
      '家用电器','家电','空调','冰箱',
      '商贸零售','超市','零售','百货',
      '纺织','服装','鞋',
      '美容护理','化妆品','护肤',
      '轻工','餐饮','烟草','生活用纸','日用',
    ]},
    { name: '能源资源', icon: '⛏️', keywords: [
      '煤炭','石油','天然气','有色金属','钢铁',
      '黄金','贵金属','白银',
      '铜','铝','稀土','钨','钼','锂矿','镍','钴','锰','铁矿',
      '化工','磷化工','氟化工','金属','矿',
    ]},
    { name: '工业 / 制造', icon: '🏭', keywords: [
      '自动化','工控','仪器仪表','机床','磨具','机械',
      '橡胶','改性塑料','氨纶','胶黏','工业气体','大宗用纸',
    ]},
    { name: '地产链', icon: '🏠', keywords: [
      '房地产','地产','建筑','建材','装修','装饰','家居',
      '水泥','玻璃','瓷砖','涂料','防水',
    ]},
    { name: '公用事业', icon: '🔌', keywords: [
      '公用事业','电力','水务','燃气','垃圾','环保',
      '污水','固废','危废','核污染',
    ]},
  ];

  /* ═══════════════════════════════════════
     State
  ═══════════════════════════════════════ */
  let cachedJson   = null;   // loaded from data/sectors.json
  let allData      = [];     // current normal board data
  let bigMerged    = [];     // merged industry+concept for big view
  let currentFsKey = 'industry';
  let sortMode     = 'pct';
  let bigSortMode  = 'pct';
  let heatmapMode  = false;
  let viewMode     = 'big';
  let allExpanded  = false;
  let useLive      = false;
  let refreshTimer = null;

  /* ── DOM ── */
  const boardEl       = document.getElementById('board-container');
  const bigEl         = document.getElementById('big-container');
  const loadingEl     = document.getElementById('loading');
  const errorEl       = document.getElementById('error-msg');
  const summaryEl     = document.getElementById('summary');
  const updateEl      = document.getElementById('updateTime');
  const statusEl      = document.getElementById('marketStatus');
  const dotEl         = document.getElementById('statusDot');
  const dataBadge     = document.getElementById('dataBadge');
  const normalToolbar = document.getElementById('normalToolbar');
  const bigToolbar    = document.getElementById('big-toolbar');

  /* ═══════════════════════════════════════
     Market status
  ═══════════════════════════════════════ */
  function getMarketStatus() {
    const bj = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
    const h = bj.getHours(), m = bj.getMinutes(), day = bj.getDay();
    const mins = h * 60 + m;
    if (day === 0 || day === 6) return 'weekend';
    if (mins >= 9*60+30 && mins < 11*60+30) return 'open';
    if (mins >= 13*60 && mins < 15*60) return 'open';
    if (mins >= 9*60+15 && mins < 9*60+30) return 'pre';
    return 'closed';
  }
  function updateStatusBadge() {
    const s = getMarketStatus();
    const labels = { open: '交易中', pre: '集合竞价', closed: '已收盘', weekend: '休市' };
    statusEl.textContent = labels[s] || '—';
    dotEl.className = 'status-dot' + (s === 'open' || s === 'pre' ? ' live' : '');
  }

  /* ═══════════════════════════════════════
     Helpers
  ═══════════════════════════════════════ */
  function fmt(v) {
    if (v == null || v === '-') return '—';
    const n = parseFloat(v);
    if (isNaN(n)) return '—';
    return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
  }
  function cls(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
  function clr(v) { return v > 0 ? 'var(--up)' : v < 0 ? 'var(--down)' : 'var(--flat)'; }

  /* ═══════════════════════════════════════
     Load cached JSON from repo
  ═══════════════════════════════════════ */
  async function loadCachedJson() {
    try {
      const r = await fetch('./data/sectors.json?t=' + Date.now());
      if (!r.ok) throw new Error('no file');
      const d = await r.json();
      if (!d.updated) throw new Error('invalid');
      return d;
    } catch { return null; }
  }

  /* ═══════════════════════════════════════
     Live JSONP fetch from EastMoney
  ═══════════════════════════════════════ */
  const FS_MAP = {
    industry: 'm:90+t:2+f:!50',
    concept:  'm:90+t:3+f:!50',
    geo:      'm:90+t:1+f:!50',
  };
  function fetchLive(fsKey) {
    const fs = FS_MAP[fsKey];
    const fields = 'f2,f3,f4,f8,f12,f14,f20,f62';
    const url = `https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=500&po=1&np=1&fltt=2&invt=2&fid=f3&fs=${encodeURIComponent(fs)}&fields=${fields}&cb=?`;
    return new Promise((resolve, reject) => {
      const cb = '_em_' + Date.now();
      const s  = document.createElement('script');
      const t  = setTimeout(() => { cleanup(); reject(new Error('超时')); }, 10000);
      function cleanup() { clearTimeout(t); delete window[cb]; s.remove(); }
      window[cb] = d => { cleanup(); resolve(d); };
      s.src = url.replace('cb=?', 'cb=' + cb);
      s.onerror = () => { cleanup(); reject(new Error('网络错误')); };
      document.head.appendChild(s);
    });
  }
  function parseLive(raw) {
    return (raw?.data?.diff || []).map(item => ({
      code: item.f12, name: item.f14,
      price: item.f2, pct: item.f3, chg: item.f4, vol: item.f20, flow: item.f62,
    })).filter(d => d.name && d.pct != null && d.pct !== '-')
       .map(d => ({ ...d, pct: parseFloat(d.pct) || 0 }));
  }

  /* ═══════════════════════════════════════
     Big sector grouping
  ═══════════════════════════════════════ */
  function matchBig(name) {
    // 过滤掉指数/策略类，不归入任何行业
    if (SKIP_CONCEPTS.some(kw => name.includes(kw))) return null;
    for (const big of BIG_SECTORS) {
      for (const kw of big.keywords) if (name.includes(kw)) return big.name;
    }
    return '其他';
  }
  function groupIntoBig(data) {
    const map = {};
    for (const b of BIG_SECTORS) map[b.name] = { ...b, subs: [], pctSum: 0 };
    map['其他'] = { name: '其他', icon: '📦', subs: [], pctSum: 0 };
    for (const d of data) {
      const k = matchBig(d.name);
      if (!k) continue;  // 跳过指数/策略类
      if (!map[k]) map[k] = { name: k, icon: '📦', subs: [], pctSum: 0 };
      map[k].subs.push(d);
      map[k].pctSum += (d.pct || 0);
    }
    const result = Object.values(map).filter(g => g.subs.length > 0);
    for (const g of result) {
      g.avgPct = g.pctSum / g.subs.length;
      g.subs.sort((a, b) => b.pct - a.pct);
    }
    return result;
  }

  /* ═══════════════════════════════════════
     Render: summary row
  ═══════════════════════════════════════ */
  function renderSummary(data) {
    const ups  = data.filter(d => d.pct > 0).length;
    const downs = data.filter(d => d.pct < 0).length;
    const avg  = data.reduce((s, d) => s + (d.pct || 0), 0) / (data.length || 1);
    const max  = data.reduce((a, b) => (a.pct ?? -99) > (b.pct ?? -99) ? a : b, data[0] || {});
    const min  = data.reduce((a, b) => (a.pct ?? 99)  < (b.pct ?? 99)  ? a : b, data[0] || {});
    summaryEl.innerHTML = `
      <div class="s-card"><div class="s-label">板块数</div><div class="s-val" style="color:var(--text)">${data.length}</div></div>
      <div class="s-card"><div class="s-label">上涨</div><div class="s-val up">${ups}</div></div>
      <div class="s-card"><div class="s-label">下跌</div><div class="s-val down">${downs}</div></div>
      <div class="s-card"><div class="s-label">平均涨跌</div><div class="s-val ${cls(avg)}">${fmt(avg)}</div></div>
      <div class="s-card"><div class="s-label">领涨</div><div class="s-val up">${(max.name||'').slice(0,5)} ${fmt(max.pct)}</div></div>
      <div class="s-card"><div class="s-label">领跌</div><div class="s-val down">${(min.name||'').slice(0,5)} ${fmt(min.pct)}</div></div>`;
  }

  /* ═══════════════════════════════════════
     Render: normal board
  ═══════════════════════════════════════ */
  function renderBoard(data) {
    let sorted = [...data];
    if (sortMode === 'pct') sorted.sort((a,b) => b.pct - a.pct);
    else sorted.sort((a,b) => a.name.localeCompare(b.name, 'zh'));
    const maxAbs = Math.max(...sorted.map(d => Math.abs(d.pct||0)), 1);

    if (heatmapMode) {
      boardEl.innerHTML = sorted.map(d => {
        const intens = Math.min(Math.abs(d.pct||0)/5, 1);
        const bg = d.pct > 0 ? `rgba(240,74,74,${0.15+intens*.6})`
                 : d.pct < 0 ? `rgba(14,203,129,${0.15+intens*.6})` : 'var(--card)';
        const sz = 80 + Math.min(Math.abs(d.pct||0)*8, 60);
        return `<div class="sector-row" style="width:${sz}px;background:${bg};border-color:transparent">
                  <div class="s-name">${d.name}</div>
                  <div class="s-pct ${cls(d.pct)}">${fmt(d.pct)}</div></div>`;
      }).join('');
    } else {
      boardEl.innerHTML = sorted.map((d,i) => {
        const bw = Math.round(Math.abs(d.pct||0)/maxAbs*100);
        return `<div class="sector-row">
                  <div class="s-rank">${i+1}</div>
                  <div class="s-name" title="${d.name}">${d.name}</div>
                  <div class="bar-wrap"><div class="bar-fill ${cls(d.pct)}" style="width:${bw}%"></div></div>
                  <div class="s-pct ${cls(d.pct)}">${fmt(d.pct)}</div></div>`;
      }).join('');
    }
  }

  /* ═══════════════════════════════════════
     Render: big sector board
  ═══════════════════════════════════════ */
  function renderBigBoard(groups) {
    let sorted = [...groups];
    if (bigSortMode === 'pct') sorted.sort((a,b) => b.avgPct - a.avgPct);
    else sorted.sort((a,b) => a.name.localeCompare(b.name,'zh'));
    const maxAbs = Math.max(...sorted.map(g => Math.abs(g.avgPct)), 1);

    bigEl.innerHTML = sorted.map(g => {
      const bw = Math.round(Math.abs(g.avgPct)/maxAbs*100);
      const c  = cls(g.avgPct);
      const mSub = Math.max(...g.subs.map(s => Math.abs(s.pct||0)), 1);
      const subsHtml = g.subs.map(s => {
        const sw = Math.round(Math.abs(s.pct||0)/mSub*100);
        return `<div class="sub-row">
                  <div class="sub-name" title="${s.name}">${s.name}</div>
                  <div class="sub-bar-wrap"><div class="sub-bar-fill" style="width:${sw}%;background:${clr(s.pct)}"></div></div>
                  <div class="sub-pct ${cls(s.pct)}">${fmt(s.pct)}</div></div>`;
      }).join('');
      const openCls = allExpanded ? 'open' : '';
      return `
        <div class="big-card ${openCls}">
          <div class="big-header" onclick="this.parentElement.classList.toggle('open')">
            <div class="bh-icon">${g.icon}</div>
            <div class="bh-name">${g.name}</div>
            <div class="bh-bar-wrap"><div class="bh-bar-fill" style="width:${bw}%;background:${clr(g.avgPct)}"></div></div>
            <div class="bh-count">${g.subs.length} 个</div>
            <div class="bh-avg ${c}">${fmt(g.avgPct)}</div>
            <div class="bh-arrow">▶</div>
          </div>
          <div class="big-subs">${subsHtml}</div>
        </div>`;
    }).join('');
  }

  /* ═══════════════════════════════════════
     Show / hide view panels
  ═══════════════════════════════════════ */
  function showBigView() {
    viewMode = 'big';
    boardEl.style.display = 'none';
    normalToolbar.style.display = 'none';
    bigEl.style.display = 'block';
    bigToolbar.style.display = 'flex';
  }
  function showNormalView() {
    viewMode = 'normal';
    bigEl.style.display = 'none';
    bigToolbar.style.display = 'none';
    boardEl.style.display = '';
    normalToolbar.style.display = '';
  }

  function setLoading(on) {
    loadingEl.style.display = on ? 'flex' : 'none';
  }
  function setError(msg) {
    if (msg) { errorEl.textContent = '⚠️ ' + msg; errorEl.style.display = 'block'; }
    else errorEl.style.display = 'none';
  }
  function setUpdateTime(str) {
    updateEl.textContent = str;
  }
  function setBadge(type, text) {
    dataBadge.textContent = text;
    dataBadge.className = 'data-badge ' + (type || '');
    dataBadge.style.display = text ? '' : 'none';
  }

  /* ═══════════════════════════════════════
     Load: big view
  ═══════════════════════════════════════ */
  async function loadBig(forceRefresh) {
    setLoading(true); setError('');
    document.getElementById('bigRefreshBtn').classList.add('spinning');
    summaryEl.innerHTML = ''; bigEl.innerHTML = '';
    showBigView();

    try {
      let ind, con;

      if (!forceRefresh && cachedJson) {
        // use already-loaded cache
        ind = cachedJson.industry || [];
        con = cachedJson.concept  || [];
        setBadge('cached', `📁 收盘数据 ${cachedJson.updated}`);
        setUpdateTime(cachedJson.updated);
      } else if (!forceRefresh) {
        // try loading cache from file
        const c = await loadCachedJson();
        if (c && (c.industry||[]).length > 0) {
          cachedJson = c;
          ind = c.industry || [];
          con = c.concept  || [];
          setBadge('cached', `📁 收盘数据 ${c.updated}`);
          setUpdateTime(c.updated);
        } else {
          // fallback to live
          forceRefresh = true;
        }
      }

      if (forceRefresh) {
        // live fetch
        setLoading(true);
        const [rInd, rCon] = await Promise.all([fetchLive('industry'), fetchLive('concept')]);
        ind = parseLive(rInd); con = parseLive(rCon);
        setBadge('live', '📡 实时数据');
        setUpdateTime(new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
      }

      // dedupe
      const seen = new Set(ind.map(d => d.name));
      bigMerged = [...ind, ...con.filter(d => !seen.has(d.name))];
      if (bigMerged.length === 0) throw new Error('获取数据为空');

      renderSummary(bigMerged);
      renderBigBoard(groupIntoBig(bigMerged));
    } catch(e) {
      setError(e.message + '（非交易时段或 API 限流）');
      renderDemoBig();
    } finally {
      setLoading(false);
      document.getElementById('bigRefreshBtn').classList.remove('spinning');
      updateStatusBadge();
    }
  }

  /* ═══════════════════════════════════════
     Load: normal tab
  ═══════════════════════════════════════ */
  async function loadNormal(fsKey, forceRefresh) {
    setLoading(true); setError('');
    document.getElementById('refreshBtn').classList.add('spinning');
    boardEl.innerHTML = ''; summaryEl.innerHTML = '';
    showNormalView();

    try {
      let data;
      if (!forceRefresh && cachedJson && cachedJson[fsKey]) {
        data = cachedJson[fsKey];
        setBadge('cached', `📁 收盘数据 ${cachedJson.updated}`);
        setUpdateTime(cachedJson.updated);
      } else if (!forceRefresh) {
        const c = cachedJson || await loadCachedJson();
        if (c && (c[fsKey]||[]).length > 0) {
          cachedJson = c;
          data = c[fsKey];
          setBadge('cached', `📁 收盘数据 ${c.updated}`);
          setUpdateTime(c.updated);
        } else forceRefresh = true;
      }
      if (forceRefresh) {
        const raw = await fetchLive(fsKey);
        data = parseLive(raw);
        setBadge('live', '📡 实时数据');
        setUpdateTime(new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
      }
      if (!data || data.length === 0) throw new Error('数据为空');
      allData = data;
      renderSummary(allData);
      renderBoard(allData);
    } catch(e) {
      setError(e.message);
      renderDemoNormal();
    } finally {
      setLoading(false);
      document.getElementById('refreshBtn').classList.remove('spinning');
      updateStatusBadge();
    }
  }

  /* ═══════════════════════════════════════
     Demo fallback
  ═══════════════════════════════════════ */
  function demoItems() {
    return ['半导体','软件开发','人工智能','消费电子','通信设备','云计算','大数据',
      '银行','证券','保险','食品饮料','白酒','家用电器','商贸零售','医药生物',
      '医疗器械','光伏设备','风电','储能','新能源汽车','煤炭','有色金属',
      '基础化工','钢铁','军工','国防','房地产','建筑材料','机场','酒店旅游',
      '汽车','机器人','人形机器人','农林牧渔','公用事业','环保']
      .map(name => ({ name, pct: parseFloat((Math.random()*10-4).toFixed(2)) }));
  }
  function renderDemoBig() {
    const d = demoItems();
    summaryEl.innerHTML = '<div class="s-card" style="grid-column:1/-1"><div class="s-label" style="color:var(--up)">⚠️ 演示数据（部署后收盘数据自动更新）</div></div>';
    renderSummary(d); renderBigBoard(groupIntoBig(d));
  }
  function renderDemoNormal() {
    allData = demoItems().slice(0,20);
    renderSummary(allData); renderBoard(allData);
  }

  /* ═══════════════════════════════════════
     Auto refresh during trading hours
  ═══════════════════════════════════════ */
  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    if (useLive && (getMarketStatus() === 'open' || getMarketStatus() === 'pre')) {
      refreshTimer = setTimeout(() => {
        if (viewMode === 'big') loadBig(true); else loadNormal(currentFsKey, true);
        scheduleRefresh();
      }, 60000);
    }
  }

  /* ═══════════════════════════════════════
     Events
  ═══════════════════════════════════════ */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.view === 'big') {
        loadBig(false);
      } else {
        currentFsKey = btn.dataset.fs;
        loadNormal(currentFsKey, false);
      }
    });
  });

  document.querySelectorAll('.sort-btn[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn[data-sort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortMode = btn.dataset.sort;
      if (allData.length) renderBoard(allData);
    });
  });

  document.querySelectorAll('.sort-btn[data-bigsort]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn[data-bigsort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bigSortMode = btn.dataset.bigsort;
      if (bigMerged.length) renderBigBoard(groupIntoBig(bigMerged));
    });
  });

  document.getElementById('bigExpandAll').addEventListener('click', function() {
    allExpanded = !allExpanded;
    this.textContent = allExpanded ? '全部收起' : '全部展开';
    document.querySelectorAll('.big-card').forEach(c => c.classList.toggle('open', allExpanded));
  });

  document.getElementById('liveToggle').addEventListener('click', function() {
    useLive = !useLive;
    this.textContent = useLive ? '📁 切换收盘数据' : '📡 实时刷新';
    this.classList.toggle('active', useLive);
    loadBig(useLive);
    scheduleRefresh();
  });

  document.getElementById('viewToggle').addEventListener('click', function() {
    heatmapMode = !heatmapMode;
    this.textContent = heatmapMode ? '📋 列表视图' : '🔥 热力图';
    boardEl.classList.toggle('heatmap', heatmapMode);
    if (allData.length) renderBoard(allData);
  });

  document.getElementById('refreshBtn').addEventListener('click', () => loadNormal(currentFsKey, true));
  document.getElementById('bigRefreshBtn').addEventListener('click', () => loadBig(useLive));

  /* ═══════════════════════════════════════
     Init
  ═══════════════════════════════════════ */
  updateStatusBadge();
  loadBig(false);
</script>
</body>
</html>
